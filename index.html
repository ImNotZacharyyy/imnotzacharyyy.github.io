<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zachary's Creator Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="branding">ImNotZacharyy</div>
  <div class="header-right">
    <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
    <button onclick="window.location.href='logi.html'">Admin Login (DONT WORK)</button>
    <button id="logout-btn" style="display:none;">Logout</button>
  </div>
</header>

<main>
  <section class="social-links" aria-label="Social media links">
    <a href="https://www.youtube.com/@ImNotZacharyy" target="_blank" class="social-icon youtube"><i class="fab fa-youtube"></i></a>
    <a href="https://www.snapchat.com/add/imnotzacharyyy" target="_blank" class="social-icon youtube"><i class="fa-brands fa-snapchat"></i></a>
    <a href="https://twitter.com/ImNotZacharyyy" target="_blank" class="social-icon x"><i class="fab fa-twitter"></i></a>
    <a href="https://bsky.app/profile/imnotzacharyy.bsky.social" target="_blank" class="social-icon bluesky"><i class="fa-brands fa-bluesky"></i></a>
    <a href="https://instagram.com/imnotzacharyyyy_" target="_blank" class="social-icon instagram"><i class="fab fa-instagram"></i></a>
    <a href="https://discord.gg/nmVusrqX6X" target="_blank" class="social-icon discord"><i class="fab fa-discord"></i></a>
    <a href="https://www.twitch.tv/imnotzacharyyyy" target="_blank" class="social-icon twitch"><i class="fab fa-twitch"></i></a>
  </section>

  <section class="bio">
    <p>Yo! I’m Zachary, a coder and content creator making vibes on YouTube and Twitch. Here to share cool tech, gaming, and behind-the-scenes. Stay tuned!</p>
  </section>

  <section class="media-embeds">
    <div class="embed-container">
      <iframe src="https://www.youtube.com/embed/LZJOgARWMW4" allowfullscreen></iframe>
    </div>
    <div class="embed-container">
      <iframe src="https://player.twitch.tv/?channel=imnotzacharyyyy&parent=localhost" allowfullscreen></iframe>
    </div>
  </section>

  <section class="announcements">
    <h2>Announcements</h2>
    <div class="announcement-list" id="announcement-list">
      <div class="announcement">Welcome to my new creator hub! Stay tuned for updates.</div>
      <div class="announcement">New video dropping this Friday! 🔥</div>
    </div>
  </section>


  <section class="auth" id="auth-section" style="display:none;">
    <label for="email-input">Email</label>
    <input type="email" id="email-input" placeholder="admin@example.com" required />
    <label for="password-input">Password</label>
    <input type="password" id="password-input" placeholder="password" required />
    <button id="login-submit-btn">Login</button>
  </section>
</main>

<div id="auth-modal">
  <section id="auth-section">
    <h2 id="auth-title">Admin Login</h2>
    <label for="email-input">Email</label>
    <input type="email" id="email-input" placeholder="admin@example.com" required />
    <label for="password-input">Password</label>
    <input type="password" id="password-input" placeholder="password" required />
    <button id="login-submit-btn">Login</button>
    <button id="auth-cancel-btn">Cancel</button>
  </section>
</div>

<script src="main.js"></script>
</body>
</html>
