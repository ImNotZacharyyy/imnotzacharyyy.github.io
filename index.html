<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Channel Name</title>
  <style>
    /* Basic reset & style */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0e0e0e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      color: #9146ff; /* Twitch purple vibe */
      margin-bottom: 8px;
    }

    header p {
      font-size: 1.2rem;
      color: #aaa;
    }

    .social-links {
      display: flex;
      gap: 30px;
      margin-bottom: 40px;
    }

    .social-links a {
      color: #fff;
      font-size: 2.5rem;
      text-decoration: none;
      transition: color 0.3s;
    }

    .social-links a:hover {
      color: #9146ff;
    }

    main {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    main h2 {
      margin-bottom: 15px;
      font-size: 2rem;
      color: #f0a500;
    }

    main p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #ddd;
    }

    footer {
      margin-top: auto;
      padding: 15px 0;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
  <!-- Icons CDN for social media -->
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

</head>
<body>
  <header>
    <h1>YourChannelName</h1>
    <p>Streaming daily on Twitch, YouTube, & TikTok</p>
  </header>

  <nav class="social-links" aria-label="Social media links">
    <a href="https://twitch.tv/ImNotZacharyyyy" target="_blank" rel="noopener" title="Twitch">
      <i class="fab fa-twitch"></i>
    </a>
    <a href="https://youtube.com/@Imnotzacharyy" target="_blank" rel="noopener" title="YouTube">
      <i class="fab fa-youtube"></i>
    </a>
    <a href="https://tiktok.com/@ImNotZacharyyyy" target="_blank" rel="noopener" title="TikTok">
      <i class="fab fa-tiktok"></i>
    </a>
  </nav>

  <main>
    <h2>About Me</h2>
    <p>
      Yo! I’m ImNotZacharyy— bringing the hype every day with gaming, streams, and chill vibes.
      Follow me to catch live gameplay, funny moments, and exclusive TikTok clips.
    </p>

    <h2>Latest Stream</h2>
<iframe
  src="https://player.twitch.tv/?channel=imnotzacharyyyy&parent=imnotzacharyy.github.io"
  height="360"
  width="640"
  frameborder="0"
  scrolling="no"
  allowfullscreen="true"
></iframe>

  </main>

  <footer>
    &copy; 2025 ImNotZacharyy— All rights reserved
  </footer>
</body>
</html>
