<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MG408V56NM"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-MG408V56NM');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login / Signup</title>

    <!-- Firebase compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: system-ui, sans-serif; max-width: 520px; margin: 4rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 12px; padding: 1rem; }
        input { width: 100%; padding: .7rem; margin:.4rem 0; border:1px solid #ccc; border-radius:8px; }
        button { padding:.7rem 1rem; margin:.4rem .3rem .4rem 0; border:0; border-radius:8px; cursor:pointer; }
        .row { display:flex; gap:.5rem; flex-wrap:wrap; }
        .muted { color:#666; font-size:.9rem; }
        .err { color:#b00020; margin-top:.6rem; }
        .ok { color:#0a7; margin-top:.6rem; }
        .divider { margin: 1rem 0; text-align:center; color:#888; font-size:.85rem; }
        .full { width:100%; }
    </style>
</head>
<body>
<h1>Login / Signup</h1>
<div class="card">
    <input id="email" type="email" placeholder="Email" autocomplete="username" />
    <input id="password" type="password" placeholder="Password (min 6 chars)" autocomplete="current-password" />
    <div class="row">
        <button id="signup">Sign Up</button>
        <button id="login">Log In</button>
        <button id="logout" style="display:none;">Log Out</button>
    </div>

    <div class="divider">— or —</div>
    <button id="google" class="full">Continue with Google</button>

    <div id="status" class="muted" style="margin-top: .6rem;">Not signed in.</div>
    <div id="msg"></div>
</div>

<script>
    // --- 1) Firebase config ---
    const firebaseConfig = {
        apiKey: "AIzaSyCXCvtJjto-D9rDw19fAOHe1lE85uxhyOA",
        authDomain: "zacharys-creator-hub.firebaseapp.com",
        projectId: "zacharys-creator-hub",
        storageBucket: "zacharys-creator-hub.firebasestorage.app",
        messagingSenderId: "673541614337",
        appId: "1:673541614337:web:08dda860dfd2109e6f4900",
        measurementId: "G-MG408V56NM"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // --- 2) Helpers + elements ---
    const $ = (id) => document.getElementById(id);
    const email = $('email');
    const password = $('password');
    const signupBtn = $('signup');
    const loginBtn = $('login');
    const logoutBtn = $('logout');
    const googleBtn = $('google');
    const statusEl = $('status');
    const msgEl = $('msg');

    function showMsg(kind, text) {
        msgEl.className = kind;
        msgEl.textContent = text;
    }

    async function ensureUserDoc(user) {
        const ref = db.collection('users').doc(user.uid);
        const snap = await ref.get();
        if (!snap.exists) {
            await ref.set({
                email: user.email || '',
                displayName: user.displayName || '',
                role: 'user',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }

    async function getRole(uid) {
        const snap = await db.collection('users').doc(uid).get();
        return snap.exists ? (snap.data().role || 'user') : 'user';
    }

    // Prevent flicker while deciding where to send user
    document.body.style.visibility = 'hidden';

    // --- 3) Redirect gate + UI state ---
    auth.onAuthStateChanged(async (user) => {
        try {
            if (!user) {
                statusEl.textContent = 'Not signed in.';
                logoutBtn.style.display = 'none';
                document.body.style.visibility = 'visible';
                return;
            }

            statusEl.textContent = `Signed in as ${user.email || user.uid}`;
            logoutBtn.style.display = 'inline-block';

            await ensureUserDoc(user);

            const role = await getRole(user.uid);
            if (role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = '/';
            }
        } catch (e) {
            console.error('Redirect gate error:', e);
            document.body.style.visibility = 'visible';
        }
    });

    // --- 4) Email/Password handlers ---
    signupBtn.onclick = async () => {
        showMsg('', '');
        try {
            const cred = await auth.createUserWithEmailAndPassword(email.value, password.value);
            await ensureUserDoc(cred.user);
            showMsg('ok', 'Signed up! Redirecting…');
            // onAuthStateChanged will redirect
        } catch (e) {
            showMsg('err', e.message);
            document.body.style.visibility = 'visible';
        }
    };

    loginBtn.onclick = async () => {
        showMsg('', '');
        try {
            await auth.signInWithEmailAndPassword(email.value, password.value);
            showMsg('ok', 'Logged in! Redirecting…');
            // onAuthStateChanged will redirect
        } catch (e) {
            showMsg('err', e.message);
            document.body.style.visibility = 'visible';
        }
    };

    logoutBtn.onclick = async () => {
        try {
            await auth.signOut();
            showMsg('ok', 'Logged out.');
        } catch (e) {
            showMsg('err', e.message);
        }
    };

    // --- 5) Google sign-in (popup) ---
    googleBtn.onclick = async () => {
        showMsg('', '');
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Optional: force account chooser each time
            provider.setCustomParameters({ prompt: 'select_account' });

            const result = await auth.signInWithPopup(provider);
            await ensureUserDoc(result.user);
            showMsg('ok', 'Signed in with Google! Redirecting…');
            // onAuthStateChanged will redirect
        } catch (e) {
            // Common causes: provider not enabled, popup blocked, unauthorized domain
            showMsg('err', e.message);
            document.body.style.visibility = 'visible';
            console.error('Google sign-in error:', e);
        }
    };

    // (Optional) If popups are blocked, you can fallback to redirect:
    // googleBtn.onclick = async () => {
    //   const provider = new firebase.auth.GoogleAuthProvider();
    //   provider.setCustomParameters({ prompt: 'select_account' });
    //   await auth.signInWithRedirect(provider);
    // };
    // auth.getRedirectResult().then(async (result) => {
    //   if (result.user) await ensureUserDoc(result.user);
    // }).catch((e) => console.error(e));
</script>
</body>
</html>
