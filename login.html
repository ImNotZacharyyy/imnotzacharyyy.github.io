<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="loginstyle.css" />
    <script type="module" src="firebase.js"></script>
    <script type="module" src="login.js" defer></script>
    <script type="module" src="signup.js" defer></script>
    <script src="toggleForms.js" defer></script>


</head>
<body class="login-body">

<h1 id="form-title">Login</h1>

<!-- Login form -->
<form id="loginForm" style="display:block;">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" required />

    <label for="login-password">Password</label>
    <input type="password" id="login-password" required />

    <button type="submit">Login</button>
    <p id="error-msg-login" class="error"></p>
</form>

<!-- Signup form -->
<form id="signupForm" style="display:none;">
    <label for="signup-email">Email</label>
    <input type="email" id="signup-email" required />

    <label for="signup-password">Password</label>
    <input type="password" id="signup-password" required />

    <button type="submit">Sign Up</button>
    <p id="error-msg-signup" class="error"></p>
</form>

<button id="google-signin-btn">Sign in with Google</button>

<button id="logout-btn" style="display:none;">Logout</button>

<button id="toggle-auth">Don't have an account? Sign Up</button>


</body>
</html>
